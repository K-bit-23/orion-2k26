    <style>
        /* Specific overrides for the rules page */
        .rules-container {
            max-width: 700px;
            margin: 120px auto 60px;
            padding: 40px;
            background: rgba(3, 16, 3, 0.88);
            /* Semi-transparent to show Doom background */
            border: 1px solid rgba(0, 255, 65, 0.25);
            position: relative;
            min-height: 60vh;
            backdrop-filter: blur(5px);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 1.1rem;
            margin-bottom: 30px;
            padding: 10px 20px;
            border: 1px solid var(--accent);
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--accent);
            color: #020d02;
        }

        .event-header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .event-title {
            font-family: var(--font-head);
            font-size: 3rem;
            color: #fff;
            text-transform: uppercase;
        }

        .event-subtitle {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            color: var(--highlight);
            margin-top: 10px;
        }

        .rules-section {
            margin-bottom: 40px;
        }

        .rules-section h3 {
            font-family: var(--font-mono);
            color: var(--accent);
            font-size: 1.4rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-left: 3px solid var(--accent);
            padding-left: 15px;
        }

        .rules-content {
            font-family: var(--font-body);
            font-size: 1.1rem;
            color: #ddd;
            line-height: 1.8;
        }

        .rules-list {
            list-style: none;
        }

        .rules-list li {
            position: relative;
            padding-left: 25px;
            margin-bottom: 15px;
        }

        .rules-list li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: var(--highlight);
            font-weight: bold;
        }

        .coordinator-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            margin-bottom: 10px;
            border-left: 2px solid var(--border-color);
        }

        /* --- DYNAMIC EFFECTS --- */
        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .rules-section {
            opacity: 0;
            /* Hidden initially */
            animation: slideUpFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Stagger the animation for child sections */
        .rules-section:nth-of-type(1) {
            animation-delay: 0.1s;
        }

        .rules-section:nth-of-type(2) {
            animation-delay: 0.2s;
        }

        .rules-section:nth-of-type(3) {
            animation-delay: 0.3s;
        }

        .rules-section:nth-of-type(4) {
            animation-delay: 0.4s;
        }

        /* List Hover Effects */
        .rules-list li {
            transition: all 0.3s ease;
        }

        .rules-list li:hover {
            color: #fff;
            transform: translateX(8px);
        }

        .rules-list li:hover::before {
            color: var(--accent);
        }

        /* Coordinator Card Hover */
        .coordinator-card {
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .coordinator-card:hover {
            transform: translateX(10px) scale(1.02);
            background: rgba(0, 255, 65, 0.08);
            border-left-color: #00ff41;
        }

        /* Loading Blink */
        @keyframes blinkText {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .loading-blink {
            animation: blinkText 1.5s infinite;
            color: var(--accent) !important;
            font-family: var(--font-mono);
            letter-spacing: 2px;
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // =============================================
            // PAGE LOADER
            // =============================================
            const pageLoader = document.getElementById('pageLoader');
            const minLoadTime = 1500;
            const startTime = Date.now();

            window.addEventListener('load', () => {
                const elapsedTime = Date.now() - startTime;
                const remainingTime = Math.max(0, minLoadTime - elapsedTime);

                setTimeout(() => {
                    if (pageLoader) {
                        pageLoader.classList.add('hidden');
                    }
                }, remainingTime);
            });

            // Theme Toggle Removed


            // =============================================
            // MATRIX RAIN EFFECT
            // =============================================
            const canvas = document.getElementById('matrix-rain');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const rainDrops = Array(Math.ceil(columns)).fill(1);

            function draw() {
                ctx.fillStyle = 'rgba(2, 13, 2, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff41';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < rainDrops.length; i++) {
                    const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                    ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                    if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                    rainDrops[i]++;
                }
            }
            setInterval(draw, 30);
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            // =============================================
            // PARSE URL AND RENDER CONTENT
            // =============================================
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('id');
            const event = eventData.find(e => e.id === eventId);
            const contentArea = document.getElementById('content-area');

            if (event) {
                // Generate HTML
                let rulesHtml = '<ul class="rules-list">';
                event.rules.forEach(rule => {
                    rulesHtml += `<li>${rule}</li>`;
                });
                rulesHtml += '</ul>';

                let coordsHtml = '';
                event.coordinators.forEach(coord => {
                    const phoneMatch = coord.match(/(\d[\d\s]*\d)/);
                    if (phoneMatch) {
                        const number = phoneMatch[0];
                        const cleanNumber = number.replace(/\s/g, '');
                        const linkedCoord = coord.replace(number, `<a href="tel:${cleanNumber}" style="color:var(--accent); text-decoration:none; border-bottom: 1px dotted var(--accent);">${number}</a> <i class="fas fa-phone-alt" style="font-size:0.8em; margin-left:5px;"></i>`);
                        coordsHtml += `<div class="coordinator-card">${linkedCoord}</div>`;
                    } else {
                        coordsHtml += `<div class="coordinator-card">${coord}</div>`;
                    }
                });

                contentArea.innerHTML = `
                    <div class="event-header">
                        <div class="event-title">${event.title} <i class="fas ${event.icon}" style="font-size: 0.6em; color: var(--accent); vertical-align: middle; margin-left: 15px;"></i></div>
                        <div class="event-subtitle">${event.subtitle || ''}</div>
                    </div>

                    <div class="rules-section">
                        <h3>MISSION BRIEF</h3>
                        <div class="rules-content">
                            <p>${event.description}</p>
                        </div>
                    </div>

                    <div class="rules-section">
                        <h3>ROSTER SIZE</h3>
                        <div class="rules-content">
                            <p>${event.teamSize}</p>
                        </div>
                    </div>

                    <div class="rules-section">
                        <h3>PROTOCOL (RULES)</h3>
                        <div class="rules-content">
                            ${rulesHtml}
                        </div>
                    </div>

                    <div class="rules-section">
                        <h3>MISSION COMMANDERS</h3>
                        <div class="rules-content">
                            ${coordsHtml}
                        </div>
                    </div>

                    <div style="margin-top: 40px; text-align: center; border-top: 2px solid rgba(0, 255, 65, 0.3); padding-top: 20px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
                        <a href="https://docs.google.com/forms/d/e/1FAIpQLSc1miQmNmZt3JqvPi3isSw8ejKA5eULTukpJN5lR1YTTKagig/viewform?usp=send_form" target="_blank" class="back-btn" style="border-style: solid; background: rgba(0, 255, 65, 0.1);">
                            <i class="fas fa-file-signature"></i> INITIATE REGISTRATION
                        </a>
                        <a href="https://www.google.com/maps/place/Kongu+Engineering+College/@11.2741632,77.6070222,17z" target="_blank" class="back-btn" style="border-style: dashed; border-color: var(--accent-cyan); color: var(--accent-cyan);">
                            <i class="fas fa-map-marker-alt"></i> LOCATE BASE STATION
                        </a>
                    </div>
                `;
            } else {
                contentArea.innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <h1 style="color: var(--accent); font-size: 3rem; margin-bottom: 20px;">404: DATA NOT FOUND</h1>
                        <p style="font-family: var(--font-mono); color: var(--text-secondary);">The requested protocol ID could not be retrieved from the central database.</p>
                        <a href="index.html" class="cta-button" style="margin-top: 30px;">RETURN TO BASE</a>
                    </div>
                `;
            }

            // =============================================
            // MOBILE NAV TOGGLE (Manual for this page)
            // =============================================
            const navToggle = document.getElementById('navToggle');
            const navLinksContainer = document.getElementById('navLinks');

            if (navToggle && navLinksContainer) {
                navToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    navLinksContainer.classList.toggle('active');
                    const icon = navToggle.querySelector('i');
                    if (navLinksContainer.classList.contains('active')) {
                        icon.classList.remove('fa-bars');
                        icon.classList.add('fa-times');
                    } else {
                        icon.classList.remove('fa-times');
                        icon.classList.add('fa-bars');
                    }
                });

                document.addEventListener('click', (e) => {
                    if (!navLinksContainer.contains(e.target) && !navToggle.contains(e.target)) {
                        navLinksContainer.classList.remove('active');
                        const icon = navToggle.querySelector('i');
                        icon.classList.remove('fa-times');
                        icon.classList.add('fa-bars');
                    }
                });
            }
        });
    </script>
